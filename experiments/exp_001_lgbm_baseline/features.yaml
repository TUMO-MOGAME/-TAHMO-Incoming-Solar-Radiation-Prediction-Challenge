# Feature group toggles. Set false to ablate a feature group during experiments.

time:
  enabled: true
  include_raw: [year, month, day, hour, minute, day_of_week, day_of_year]
  cyclical: [hour, month, day_of_year]

solar_geometry:
  enabled: false   # turn on once src/features/solar_geometry.py is implemented
  features:
    - solar_zenith
    - solar_azimuth
    - day_length
    - clearsky_ghi
    - is_daylight

weather_lags:
  enabled: false
  columns:
    - "relativehumidity (-)"
    - "temperature (degrees Celsius)"
    - "precipitation (mm)"
  lag_steps: [1, 2, 4]              # 15-min steps → 15min, 30min, 1h
  rolling_windows: [4, 8, 16]       # 1h, 2h, 4h rolling means

station_features:
  enabled: false
  target_encoding: false             # CV-safe target encoding of station
  station_categorical: true          # pass station as a categorical to the model