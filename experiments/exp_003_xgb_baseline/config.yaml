# Central project configuration. Paths are relative to the project root.

project:
  name: tahmo-solar-radiation
  seed: 42

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  external_dir: data/external
  experiments_dir: experiments
  models_dir: models
  submissions_dir: submissions
  reports_dir: reports
  train_raw: data/raw/Train.csv
  test_raw: data/raw/Test.csv
  sample_submission_raw: data/raw/SampleSubmission.csv
  train_interim: data/interim/train.parquet
  test_interim: data/interim/test.parquet
  sample_submission_interim: data/interim/sample_submission.parquet

columns:
  id: ID
  timestamp: timestamp
  station: station
  station_name: station_name
  country: country
  target: "radiation (W/m2)"
  weather:
    - "precipitation (mm)"
    - "relativehumidity (-)"
    - "temperature (degrees Celsius)"
  station_meta:
    - installation_height
    - elevation
    - latitude
    - longitude
  submission_targets:
    - TargetMBE
    - TargetRMSE

cv:
  # First strategy is PRIMARY — used for decisions, train.py reads its
  # best_iteration, and OOF predictions are saved for it. The rest are
  # sanity checks reported in cv_dashboard.json.
  strategies:
    - leave_one_month_out     # primary — mimics test (predict unseen months)
    - group_kfold_by_year     # sanity — catches over-fit to 2018 (68% of train)
    - time_forward            # sanity — catches future-info feature leakage
  train_months: [1, 3, 5, 7, 9, 11]
  n_folds_time_forward: 4
  per_station_score: true

evaluation:
  # Combined score weights — placeholder until competition page is confirmed
  mbe_weight: 0.5
  rmse_weight: 0.5
  # Clip predictions to physical bounds before scoring + submitting
  clip_min: 0.0
  clip_max: 1500.0   # observed train max 1427 W/m²; small margin